{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

/* ══ NAVBAR ══ */
#main-nav {
  width: 100%;
  background: rgba(255,255,255,0.95);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 30px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom-left-radius: 12px;
  border-bottom-right-radius: 12px;
}

.nav-logo {
  font-size: 1.4rem;
  font-weight: bold;
  color: #1e3a8a;
  text-decoration: none;
}

.nav-logo span {
  color: #0f172a;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
}

.nav-links li a {
  text-decoration: none;
  color: #1e3a8a;
  font-weight: 500;
  transition: 0.3s;
  padding: 6px 12px;
  border-radius: 6px;
}

.nav-links li a:hover,
.nav-links li a.active {
  background: #1e3a8a;
  color: #fff;
}

.nav-cta {
  background: #0f172a;
  color: #fff !important;
}

.nav-cta:hover {
  background: #1e3a8a;
}

/* ══ LOGIN CARD ══ */
.login-container {
  background: #fff;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  margin-top: 50px;
  animation: fadeIn 0.6s ease;
}

/* Title */
.login-container h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #1e3a8a;
}

/* Inputs */
.login-container label {
  font-size: 14px;
  color: #333;
}

.login-container input {
  width: 100%;
  padding: 10px;
  margin: 8px 0 18px;
  border-radius: 6px;
  border: 1px solid #ccc;
  transition: 0.3s;
}

.login-container input:focus {
  border-color: #1e3a8a;
  outline: none;
  box-shadow: 0 0 5px rgba(30,58,138,0.3);
}

/* Button */
.login-container button {
  width: 100%;
  padding: 12px;
  background: #1e3a8a;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.login-container button:hover {
  background: #0f172a;
}

/* Error */
.error {
  margin-top: 15px;
  text-align: center;
  color: red;
}

/* Footer */
.login-footer {
  margin-top: 15px;
  text-align: center;
  font-size: 13px;
  color: #777;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE NAVBAR */
@media (max-width: 768px) {
  .nav-links {
    display: none;
    flex-direction: column;
    gap: 10px;
    background: #fff;
    position: absolute;
    top: 60px;
    right: 20px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  .nav-links.show {
    display: flex;
  }

  .nav-toggle {
    display: block;
    font-size: 1.5rem;
    background: none;
    border: none;
    color: #1e3a8a;
    cursor: pointer;
  }
}

.nav-toggle {
  display: none;
}
</style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav id="main-nav">
  <a class="nav-logo" href="#">Public Health <span>PORTAL</span></a>
  <button class="nav-toggle" id="nav-toggle">&#9776;</button>
  <ul class="nav-links">
    <li><a href="#" class="active">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Team</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="{% url 'library' %}">Library</a></li>
    <li><a class="nav-cta" href="{% url 'login' %}">Admin Login</a></li>
  </ul>
</nav>

<div class="login-container">
  <h2>🔐 Admin Login</h2>

  <form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username" placeholder="Enter username" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>

    <button type="submit">Login</button>
  </form>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <div class="login-footer">
    EduVault Admin Panel
  </div>
</div>

<script>
const navToggle = document.getElementById('nav-toggle');
const navLinks = document.querySelector('.nav-links');
navToggle.addEventListener('click', () => {
  navLinks.classList.toggle('show');
});
</script>

</body>
</html>
